seo:
  title: "Speak & Host | Quentin Fears | Keynotes, panels, hosting"
  description: "Book Quentin Fears to speak and host: keynotes, panels, workshops, and on-camera hosting on style, perception, and creative leadership."
  ogTitle: "Speak & Host | Quentin Fears"
  ogDescription: "Keynotes, panels, workshops, and on-camera hosting on style, identity, and creative leadership."
  ogType: "website"
hero:
  eyebrow: "Speak & host"
  heading: "A fashion voice, on any stage."
  intro: "I make style make sense for a leadership summit, a fashion school, a panel, a podcast, or a camera. I keynote, moderate, teach, and host, and I bring both a point of view and the on-set years to back it up."
  buttonLabel: "Book Quentin"
stage:
  youtubeId: "6JPdZa60miY"
  ariaLabel: "Play: Quentin Fears speaking at the 100 Black Men of America National Conference"
  image:
    src: "assets/img/speak-stage.jpg"
    alt: "Quentin Fears speaking on stage at the 100 Black Men of America national conference"
    tag: "On stage"
    label: "100 Black Men of America National Conference"
  caption: "Speaking at the 100 Black Men of America National Conference. Press play to watch."
reel:
  youtubeId: "7EeeYig__4o"
  ariaLabel: "Play: Quentin Fears hosting on Sheen Talk Live"
  image:
    src: "assets/img/speak-reel.jpg"
    alt: "Quentin Fears hosting on Sheen Talk Live"
    tag: "Sheen Talk Live"
    label: "Quentin Fears hosting"
  caption: "Hosting <em>The Journey</em> on Sheen Talk Live. Full episodes below."
topics:
  eyebrow: "Talk topics"
  heading: "Six talks, one throughline."
  intro: "Each flexes from a 15-minute fireside to a half-day workshop. I'll tailor the framing to your audience: corporate, education, or industry."
  items:
    - title: "How style shapes perception"
      body: "Why what we wear is read as data, and how to control the signal on purpose."
    - title: "Dressing with intent"
      body: "A practical, psychological framework for using clothing to support who you're becoming."
    - title: "From executor to creative leader"
      body: "The shift from doing the work to directing it: how I made it, and how you can."
    - title: "Building a career in fashion"
      body: "Honest lessons on breaking in, standing out, and advancing in a crowded creative industry."
    - title: "Visual identity & professional growth"
      body: "How presentation affects advancement, and what it means to dress for the room you want."
    - title: "Aspiration without intimidation"
      body: "Making fashion accessible to everyone without stripping out the magic that makes it aspirational."
formats:
  eyebrow: "Formats"
  heading: "Ways to work together."
  chips:
    - "Keynote"
    - "Panel & fireside"
    - "Workshop"
    - "Moderation"
    - "On-camera hosting"
    - "Correspondent & interviews"
    - "Employee resource groups"
    - "University & fashion schools"
media:
  eyebrow: "On camera"
  heading: "This isn't a claim. The footage exists."
  intro: "I host <em>The Journey</em> on Sheen Talk Live: long-form conversations with people who shape culture. I've also delivered fashion segments for national television. A sample:"
  episodes:
    - href: "https://www.youtube.com/watch?v=WR8hbFuHeqg"
      thumbSrc: "assets/img/media-larry.jpg"
      thumbAlt: "Quentin Fears interviews Larry Sims"
      tag: "Sheen Talk Live"
      title: "Larry Sims"
      body: "Celebrity hairstylist, on craft and career."
    - href: "https://youtu.be/8mQbKjS_8VA"
      thumbSrc: "assets/img/media-cali.jpg"
      thumbAlt: "Quentin Fears presenting fashion trends on California Live"
      tag: "California Live"
      title: "Fashion trends, every age"
      body: "Trend segment for NBC's California lifestyle show: style that works for all ages."
    - href: "https://www.youtube.com/watch?v=AxFFn_2NdVI&t=49s"
      thumbSrc: "assets/img/media-bnc.jpg"
      thumbAlt: "Quentin Fears on Black News Channel sharing holiday shopping tips highlighting Black designers"
      tag: "Black News Channel"
      title: "Holiday shopping, Black designers"
      body: "Cyber Monday and Black Friday tips with BNC's Marcel Clarke, spotlighting Black designers."
  footnote: "Also on camera: an interview with Tommy Hilfiger."
cta:
  heading: "Programming an event?"
  body: "Send the audience, date, and format. I'll come back with topics and availability."
  buttonLabel: "Book to speak"
  buttonHref: "contact.html"

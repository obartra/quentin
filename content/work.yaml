seo:
  title: "Work | Quentin Fears | Fashion direction case studies"
  description: "Selected work by Quentin Fears: enterprise visual merchandising, cultural commentary, editorial art direction, and celebrity styling, told as case studies."
  ogTitle: "Work | Quentin Fears"
  ogDescription: "Case studies in fashion direction, visual strategy, and styling."
  ogType: "website"
hero:
  eyebrow: "Work"
  heading: "Selected work"
  intro: "Not galleries. Cases. For each one: the problem I walked into, the story we had to tell, the calls I made, and what came out the other side. The pictures are proof. The thinking is the point."
cases:
  - tag: "Enterprise · Visual strategy"
    title: "Making an everyday brand feel intentional"
    image:
      src: "assets/img/work-enterprise.jpg"
      alt: "Enterprise visual merchandising work"
      tag: "Enterprise"
      label: "National retail campaign: creative direction"
    gallery: "commercial"
    meta:
      - dt: "The problem"
        dd: "A Fortune&nbsp;1 retailer needed one fashion point of view across campaigns, store floors, and every place a customer sees it."
      - dt: "The story"
        dd: "Everyday doesn't have to mean afterthought. I wanted the clothes to look chosen: aspirational, but never out of reach."
      - dt: "What I did"
        dd: "Set the visual language, directed how looks read on the floor and on camera, and guided teams across merchandising, marketing, and production."
      - dt: "The result"
        dd: "Execution that holds the vision at scale. Led, not just staffed."
    footerKind: "note"
    footerText: "I keep the specifics generic out of respect for my employer. The detail comes in conversation."
    footerHref: ""
  - tag: "Cultural commentary"
    title: "The office dress code, after it broke"
    image:
      src: "assets/img/work-time.jpg"
      alt: "TIME feature on office dressing"
      tag: "Point of view"
      label: "TIME: new rules for office dressing"
    gallery: ""
    meta:
      - dt: "The problem"
        dd: "Offices reopened and nobody knew what \"professional\" meant anymore. TIME asked me to explain it to a national audience."
      - dt: "The story"
        dd: "A suit used to signal money and seriousness. After 2020 that signal broke, and it never read the same for everyone wearing it."
      - dt: "What I said"
        dd: "<em>\"You would assume someone wearing a suit has a lot of money. Now that's been flipped on its head. The guy in the hoodie makes just as much, or maybe more.\"</em>"
      - dt: "The result"
        dd: "A point of view on dress, identity, and perception that people still repeat back to me. The seed of a keynote."
    footerKind: "link"
    footerText: "Read the full idea"
    footerHref: "ideas"
  - tag: "Editorial · Art direction"
    title: "Styling as a mini-play"
    image:
      src: "assets/img/work-editorial.jpg"
      alt: "Editorial art direction"
      tag: "Editorial"
      label: "Editorial art direction: Glitter & Ladygunn"
    gallery: "editorial"
    meta:
      - dt: "The problem"
        dd: "An editorial page is blank until someone decides what it's about. At Glitter and Ladygunn, that was my call, as stylist and art director both."
      - dt: "The story"
        dd: "I treat a shoot like a role. What story are we telling, who is this person, and what do the clothes do to them?"
      - dt: "What I did"
        dd: "Ran concept, mood, styling, and art direction as one authored point of view, not four separate jobs."
      - dt: "The result"
        dd: "A method I still use, narrative first, now scaled from a single spread to a national campaign."
    footerKind: "none"
    footerText: ""
    footerHref: ""
  - tag: "Celebrity · Red carpet"
    title: "The look that gets photographed"
    image:
      src: "assets/img/work-celebrity.jpg"
      alt: "Celebrity and red carpet styling"
      tag: "Celebrity"
      label: "Cover & red-carpet styling"
    gallery: "celebrity-women"
    meta:
      - dt: "The problem"
        dd: "On a carpet or a cover, the image is the whole message, and there's exactly one chance to get it right."
      - dt: "The story"
        dd: "I dress the person, not the trend, so the look says something true about who they are and where they're headed."
      - dt: "What I did"
        dd: "Sourcing, fittings, and on-the-day calls under real pressure: the clock, the fit, and the cameras waiting."
      - dt: "The result"
        dd: "Work for Macy Gray, Skai Jackson, Norman Reedus, Keesha Sharp, EJ Johnson, and Garcelle Beauvais, plus covers including Sheen."
    footerKind: "none"
    footerText: ""
    footerHref: ""

seo:
  title: "Quentin Fears | Fashion Creative Leader & Visual Strategist"
  description: "Quentin Fears is a fashion creative leader, visual strategist, speaker, and host, helping brands and people communicate who they are through style."
  ogTitle: "Quentin Fears | Fashion Creative Leader & Visual Strategist"
  ogDescription: "Helping brands and people communicate who they are, and who they're becoming, through style."
  ogType: "website"
hero:
  eyebrow: "Fashion creative leadership & visual strategy"
  role: "Fashion creative leader, visual strategist, speaker & host."
  philosophy: "I help brands and people use style to show the world not just who they are, but who they're becoming. I spent a decade proving it look by look. Now I direct the vision."
  buttons:
    - label: "Start a project"
      href: "contact.html"
      external: false
      solid: true
    - label: "Book a talk"
      href: "speak.html"
      external: false
      solid: false
    - label: "Follow"
      href: "https://www.instagram.com/mrqfears/"
      external: true
      solid: false
  image:
    src: "assets/img/hero-portrait.jpg"
    alt: "Quentin Fears"
    tag: "Portrait"
    label: "Quentin Fears studio portrait"
proof:
  - num: "01"
    title: "I lead at scale"
    body: "I direct visual merchandising and styling in enterprise fashion at Walmart, the largest retailer in the world."
  - num: "02"
    title: "I'm quoted on it"
    body: "TIME and Glamour have come to me on how what you wear changes the way you're read at work."
  - num: "03"
    title: "I've done the work"
    body: "I've dressed red carpets, directed editorials, and shot campaigns. I know what it takes to get the perfect shot."
belief:
  eyebrow: "The idea"
  quote: "What you wear changes how people <span class=\"accent\">read</span> you before you speak. Style is how you tell them who you're becoming."
  cite: "The belief behind every project"
selectedWork:
  eyebrow: "Selected work"
  heading: "The finished look is the easy part. The thinking is the work."
  intro: "I open every project with three questions. What's the story? Who is telling it? And what do the clothes do to them? A few examples."
  cards:
    - tag: "Enterprise"
      title: "Making an everyday brand feel intentional"
      body: "I turn business goals into a visual language across campaigns, store floors, and the teams who build them."
      href: "work.html"
    - tag: "Point of view"
      title: "The office dress code, after it broke"
      body: "When offices reopened, the old rules were dead. I said so in TIME, and people still repeat it back to me."
      href: "ideas.html"
    - tag: "Editorial"
      title: "Styling as a mini-play"
      body: "I treat a shoot like a role: story, character, and what the clothes do to the person wearing them."
      href: "work.html"
  moreLabel: "See the full body of work"
  moreHref: "work.html"
speakTeaser:
  eyebrow: "Speak & host"
  heading: "Put me on a stage and I'll make style make sense."
  lead: "Keynotes, panels, workshops, hosting. On how style shapes perception, how to dress with intent, and how I moved from doing the work to directing it. I've done it on camera with Tommy Hilfiger, on Sheen Talk Live, and for Black News Channel."
  linkLabel: "Talk topics & booking"
  linkHref: "speak.html"
  image:
    src: "assets/img/speak-still.jpg"
    alt: "Quentin Fears on camera"
    tag: "Reel"
    label: "Speaking & on-camera reel"
testimonials:
  eyebrow: "In their words"
  heading: "The people I've worked with say it better than I could."
  items:
    - quote: "He listens first, then translates exactly what you're trying to say into something you can see and wear."
      name: "Santana Dempsey"
      role: "Actor & client"
    - quote: "Reliable on set and a real collaborator on the design. He understands what it takes to actually produce the work."
      name: "Brian S."
      role: "Photographer & collaborator"
    - quote: "He stepped into a mentor role and taught me a whole language of how to dress."
      name: "Personal styling client"
      role: "via Thumbtack"
press:
  eyebrow: "Seen & featured"
  logos:
    - "TIME"
    - "Glamour"
    - "Sheen Magazine"
    - "LADYGUNN"
    - "Glitter"
    - "Black News Channel"
cta:
  heading: "Let's make sure you're read the way you intend."
  body: "Creative direction, speaking, media, or personal styling. Tell me what you're building."
  buttonLabel: "Get in touch"
  buttonHref: "contact.html"

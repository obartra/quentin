name: Validate

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build site (Astro -> dist/)
        run: npm run build
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Validate site consistency
        run: python3 tools/validate_site.py dist
      - name: Validate SEO invariants
        run: python3 tools/seo_check.py dist
      - name: Validate image budget
        run: python3 tools/check_images.py

      - name: Newsletter assembly unit tests
        run: python3 tools/test_newsletter_draft.py

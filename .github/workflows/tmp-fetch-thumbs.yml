name: tmp-fetch-thumbs

on:
  push:
    branches: [claude/site-updates-not-visible-iath3s]

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download YouTube thumbnails and commit them
        run: |
          [ -d tmp-thumbs/cali-frames ] && exit 0
          mkdir -p tmp-thumbs/cali-frames
          for name in sddefault sd1 sd2 sd3 maxres1 maxres2 maxres3 hq1 hq2 hq3 0; do
            curl -fsSL -o "tmp-thumbs/cali-frames/$name.jpg" \
              "https://img.youtube.com/vi/8mQbKjS_8VA/$name.jpg" || true
          done
          ls -la tmp-thumbs/cali-frames
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tmp-thumbs
          git commit -m "temp: youtube thumbnails (removed before merge)"
          git push

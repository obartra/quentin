# Netlify config for the HOSTED KEYSTATIC ADMIN only.
#
# The canonical public site is deployed to GitHub Pages (see
# .github/workflows/deploy.yml) and does not use this file. This deploy exists
# solely to serve the Keystatic admin at /keystatic so a non-technical editor can
# edit content from a browser; saving commits to the repo, which triggers the
# Pages deploy. Setup steps and required environment variables are in
# docs/hosted-admin.md.
[build]
  command = "npm run build:admin"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

# Memorable alias: /admin forwards to the Keystatic admin. The Keystatic Astro
# integration hardcodes its routes at /keystatic, so this is a redirect, not a
# rename — /keystatic keeps working. 302 (not 301) so browsers don't cache it
# permanently if the admin ever moves.
[[redirects]]
  from = "/admin"
  to = "/keystatic"
  status = 302

[[redirects]]
  from = "/admin/*"
  to = "/keystatic/:splat"
  status = 302
